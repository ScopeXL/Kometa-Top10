##############################################################################
#                     Streaming Top 10 Movie Collections                     #
#                             Created by ScopeXL                             #
#          EDITING THIS FILE MAY CAUSE PULLING NEW UPDATES TO FAIL           #
##############################################################################
# Visibility is controlled via template_variables passed from config.yml.
# TMDb list IDs are public "Top 10" lists maintained by ScopeXL.
##############################################################################

external_templates:
  default: templates
  template_variables:
    collection_section: "031"

templates:
  topten:
    default:
      style:                  color
      url_poster_<<key>>:     https://raw.githubusercontent.com/ScopeXL/Kometa-Top10/main/images/chart/<<style>>/<<key>>_top_10.jpg
      sync_mode:              sync
      collection_order:       custom
      summary:                "Top 10 Movies streaming on <<key_name>>."
    optional:
      - tmdb_list
    tmdb_list:        <<tmdb_list>>
    url_poster:       <<url_poster_<<key>>>>
    sync_mode:        <<sync_mode>>
    collection_order: <<collection_order>>
    summary:          <<summary>>

collections:

  Top 10 Collections:
    template:
      - name: separator
        separator: top10
        key_name: Top 10
        translation_key: separator
    url_poster: https://raw.githubusercontent.com/ScopeXL/Kometa-Top10/main/images/separators/orig/top10.jpg

  Netflix Top 10 Movies:
    variables:
      key:          netflix
      key_name:     Netflix
    template:
      - name:       topten
        tmdb_list:  8300585
      - name:       shared
      - name:       arr

